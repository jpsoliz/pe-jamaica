rule_profile: sidwell_validation_v1
rule_version: 1.0.0

# Closure tolerance profiles are defined here first so the
# Validate Points / Final Review implementation can bind to an
# agreed external contract instead of hardcoded thresholds.
# These profiles are not yet enforced until Story 5.23 is implemented.
closure_tolerance_defaults:
  rule_id: closure_default_standard
  title: Standard parcel closure tolerance
  description: Default closure tolerance for closed parcel traverses when no more specific parcel-type rule applies.
  enabled: true
  severity: blocker
  parcel_type: standard_closed
  applies_to:
    workflow_names:
      - parcel_workflow
    workflow_stages:
      - Assign Computation Task
      - Compute Survey Plan
  allow_open_boundary: false
  max_closure_distance_m: 0.3
  min_misclose_ratio_denominator: 2500
  warning_closure_distance_m: 0.15
  warning_misclose_ratio_denominator: 4000
  evaluation_basis: distance_and_ratio
  fallback: true

closure_tolerance_profiles:
  - rule_id: closure_standard_plan_exam
    title: Standard closed parcel tolerance for compute review
    description: Use for ordinary closed parcels extracted from computation sheets in compute workflow transactions.
    enabled: true
    severity: blocker
    parcel_type: standard_closed
    applies_to:
      transaction_types:
        - Plan Examination
        - Cadastral Plan Examination
      transaction_stage_names:
        - Assign Computation Task
        - Compute Survey Plan
      source_roles:
        - computation_source
        - points_computation
    allow_open_boundary: false
    max_closure_distance_m: 0.3
    min_misclose_ratio_denominator: 2500
    warning_closure_distance_m: 0.15
    warning_misclose_ratio_denominator: 4000
    evaluation_basis: distance_and_ratio

  - rule_id: closure_small_parcel_precision
    title: Higher precision tolerance for small closed parcels
    description: Optional tighter closure profile for small or high-confidence closed parcels when parcel type is explicitly classified as precision-sensitive.
    enabled: true
    severity: blocker
    parcel_type: precision_closed
    applies_to:
      transaction_types:
        - Plan Examination
        - Cadastral Plan Examination
      source_roles:
        - computation_source
        - points_computation
    allow_open_boundary: false
    max_closure_distance_m: 0.15
    min_misclose_ratio_denominator: 5000
    warning_closure_distance_m: 0.08
    warning_misclose_ratio_denominator: 8000
    evaluation_basis: distance_and_ratio

  - rule_id: closure_open_boundary_review
    title: Open boundary parcel review profile
    description: Use for parcel types that are expected to remain open or partially defined during review and should not hard-block on closure alone.
    enabled: true
    severity: warning
    parcel_type: open_boundary
    applies_to:
      transaction_types:
        - Plan Examination
        - Cadastral Plan Examination
      source_roles:
        - computation_source
        - plan_map_reference
    allow_open_boundary: true
    max_closure_distance_m: 2.0
    min_misclose_ratio_denominator: 250
    warning_closure_distance_m: 0.5
    warning_misclose_ratio_denominator: 1000
    evaluation_basis: informational

  - rule_id: closure_tabular_coordinate_import
    title: Imported coordinate parcel tolerance
    description: Use for parcels built from TXT/CSV coordinate imports where closure should still be checked but source confidence may differ from direct computation extraction.
    enabled: true
    severity: blocker
    parcel_type: imported_coordinates
    applies_to:
      source_roles:
        - points_computation
      file_types:
        - .txt
        - .csv
    allow_open_boundary: false
    max_closure_distance_m: 0.3
    min_misclose_ratio_denominator: 2500
    warning_closure_distance_m: 0.15
    warning_misclose_ratio_denominator: 4000
    evaluation_basis: distance_and_ratio

rules:
  - id: approved_review_snapshot_current
    severity: critical
  - id: review_rows_present
    severity: high
  - id: review_rows_resolved
    severity: high
  - id: required_coordinates_present
    severity: high
  - id: coordinates_numeric
    severity: high
  - id: unique_point_identifiers
    severity: warning

parcel_construction_readiness_defaults:
  parcel_type: standard_closed
  enabled: true
  severity: blocker
  min_segment_count: 3
  require_contiguous_sequence: true
  require_referenced_points: true
  require_chain_consistency: true
  detect_duplicate_edges: true

parcel_construction_readiness_profiles:
  - rule_id: readiness_boundary_completeness
    title: Boundary completeness
    category: boundary_completeness
    parcel_type: standard_closed
    enabled: true
    severity: blocker
    require_contiguous_sequence: true

  - rule_id: readiness_minimum_segment_count
    title: Minimum segment count
    category: minimum_segment_count
    parcel_type: standard_closed
    enabled: true
    severity: blocker
    min_segment_count: 3

  - rule_id: readiness_line_without_point_support
    title: Line without point support
    category: line_without_point_support
    parcel_type: standard_closed
    enabled: true
    severity: blocker
    require_referenced_points: true

  - rule_id: readiness_orphan_line_detection
    title: Orphan line detection
    category: orphan_line_detection
    parcel_type: standard_closed
    enabled: true
    severity: warning
    require_chain_consistency: true

  - rule_id: readiness_shared_edge_consistency
    title: Shared-edge consistency
    category: shared_edge_consistency
    parcel_type: standard_closed
    enabled: true
    severity: warning
    detect_duplicate_edges: true

  - rule_id: readiness_boundary_completeness_open
    title: Boundary completeness for open-boundary review
    category: boundary_completeness
    parcel_type: open_boundary
    enabled: true
    severity: warning
    require_contiguous_sequence: true

  - rule_id: readiness_minimum_segment_count_open
    title: Minimum segment count for open-boundary review
    category: minimum_segment_count
    parcel_type: open_boundary
    enabled: true
    severity: warning
    min_segment_count: 2

  - rule_id: readiness_line_without_point_support_open
    title: Line without point support for open-boundary review
    category: line_without_point_support
    parcel_type: open_boundary
    enabled: true
    severity: warning
    require_referenced_points: true

  - rule_id: readiness_orphan_line_detection_open
    title: Orphan line detection for open-boundary review
    category: orphan_line_detection
    parcel_type: open_boundary
    enabled: true
    severity: warning
    require_chain_consistency: true

  - rule_id: readiness_shared_edge_consistency_open
    title: Shared-edge consistency for open-boundary review
    category: shared_edge_consistency
    parcel_type: open_boundary
    enabled: false
    severity: info
    detect_duplicate_edges: true

  - rule_id: readiness_boundary_completeness_imported
    title: Boundary completeness for imported coordinates
    category: boundary_completeness
    parcel_type: imported_coordinates
    enabled: true
    severity: blocker
    require_contiguous_sequence: true

  - rule_id: readiness_minimum_segment_count_imported
    title: Minimum segment count for imported coordinates
    category: minimum_segment_count
    parcel_type: imported_coordinates
    enabled: true
    severity: blocker
    min_segment_count: 3

  - rule_id: readiness_line_without_point_support_imported
    title: Line without point support for imported coordinates
    category: line_without_point_support
    parcel_type: imported_coordinates
    enabled: true
    severity: warning
    require_referenced_points: false

  - rule_id: readiness_orphan_line_detection_imported
    title: Orphan line detection for imported coordinates
    category: orphan_line_detection
    parcel_type: imported_coordinates
    enabled: false
    severity: info
    require_chain_consistency: false

  - rule_id: readiness_shared_edge_consistency_imported
    title: Shared-edge consistency for imported coordinates
    category: shared_edge_consistency
    parcel_type: imported_coordinates
    enabled: false
    severity: info
    detect_duplicate_edges: false
